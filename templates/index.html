{% extends "base.html" %}

{% block content %}
<p><a href="{{ url_for('add') }}" class="btn">＋ 新規追加</a></p>

{% if todos %}
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>タイトル</th>
            <th>内容</th>
            <th>期日</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        {% for todo in todos %}
        <tr>
            <td>{{ todo.id }}</td>
            <td>{{ todo.title }}</td>
            <td>{{ todo.content }}</td>
            <td>{{ todo.due_date }}</td>
            <td class="actions">
                <a href="{{ url_for('edit', todo_id=todo.id) }}" class="btn btn-small">編集</a>
                <form action="{{ url_for('delete', todo_id=todo.id) }}" method="post" style="display:inline;" onsubmit="return confirm('削除しますか？');">
                    <button type="submit" class="btn btn-small btn-danger">削除</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>Todoがありません。上の「新規追加」から登録してください。</p>
{% endif %}
{% endblock %}
