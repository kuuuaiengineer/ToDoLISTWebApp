{% extends "base.html" %}

{% block content %}
<h2>ログイン</h2>

{% if google_enabled %}
<p>
    <a href="{{ url_for('login_google') }}" class="btn" style="background:#4285f4;">
        Googleでログイン
    </a>
</p>
<p style="color:#666; margin:16px 0;">または</p>
{% endif %}

<form method="post" action="{{ url_for('login') }}">
    <div class="form-group">
        <label for="username">ユーザー名</label>
        <input type="text" id="username" name="username" {% if not google_enabled %}required{% endif %} autofocus>
    </div>
    <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" {% if not google_enabled %}required{% endif %}>
    </div>
    <div class="actions">
        <button type="submit" class="btn">ログイン</button>
        <a href="{{ url_for('register') }}" class="btn" style="background:#6c757d;">新規登録</a>
    </div>
</form>
{% endblock %}
